  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

    2: { ac: "#ef4444", lt: "#fca5a5", glow: "rgba(239,68,68," },

  ctx.fill();

  ctx.save();

  bG.addColorStop(0, "#8b95a7");
  bG.addColorStop(0.45, "#3a4252");
  bG.addColorStop(1, "#141925");
  ctx.fillStyle = bG;
  roundRectPath(ctx, -CELL * 0.2, -barrelW / 2, barrelLen, barrelW, 4);
  ctx.fill();
  ctx.fillStyle = n.ac;
  ctx.fillRect(CELL * 0.2, -1, barrelLen - CELL * 0.55, 1.3);
  ctx.shadowColor = n.ac;
  ctx.shadowBlur = 9;
  ctx.fillStyle = n.lt;
  roundRectPath(ctx, barrelLen - CELL * 0.4, -barrelW / 2 - 1.5, 4.5, barrelW + 3, 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
  // \u2014 Basis-Kuppel (Gunmetal-Radial) \u2014
  const grad = ctx.createRadialGradient(cx - R * 0.35, cy - R * 0.4, 1, cx, cy, R * 0.85);
  grad.addColorStop(0, "#5a6477");
  grad.addColorStop(0.5, "#2c333f");
  grad.addColorStop(1, "#10141d");
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, R * 0.8, 0, Math.PI * 2);
  ctx.fill();
  // Neon-Ring um Basis
  ctx.strokeStyle = n.ac;
  ctx.lineWidth = 2.2;
  ctx.beginPath();
  ctx.arc(cx, cy, R * 0.8, 0, Math.PI * 2);
  ctx.stroke();
  // Schraubbolzen
  ctx.fillStyle = "rgba(0,0,0,0.45)";
  for (let i = 0; i < 6; i++) {
    const a = i / 6 * Math.PI * 2;
    ctx.beginPath();
    ctx.arc(cx + Math.cos(a) * R * 0.58, cy + Math.sin(a) * R * 0.58, 1.5, 0, Math.PI * 2);

  ctx.fillStyle = "rgba(255,255,255,0.28)";
  ctx.beginPath();
  ctx.arc(cx - R * 0.28, cy - R * 0.3, R * 0.22, 0, Math.PI * 2);
  ctx.fill();
  // innerer Kern (Energiepunkt)
  ctx.fillStyle = n.lt;
  ctx.beginPath();
  ctx.arc(cx, cy, R * 0.16, 0, Math.PI * 2);
  ctx.fill();
  // \u2014 Neon-Wimpel \u2014
  const flagH = CELL * 2.2;
  const fx = cx + R * 0.55, fy = cy - R * 0.7;
  ctx.strokeStyle = "#94a3b8";
  ctx.lineWidth = 1.6;
  ctx.beginPath();
  ctx.moveTo(fx, fy);
  ctx.lineTo(fx, fy - flagH);
  ctx.stroke();
  const wave = Math.sin(now / 200) * 3;
  ctx.fillStyle = n.ac;
  ctx.beginPath();
  ctx.moveTo(fx, fy - flagH);
  ctx.quadraticCurveTo(fx + CELL * 0.8, fy - flagH + wave, fx + CELL * 1.4, fy - flagH + wave * 0.5);
  ctx.lineTo(fx + CELL * 1.4, fy - flagH + CELL * 0.8 + wave * 0.5);
  ctx.quadraticCurveTo(fx + CELL * 0.8, fy - flagH + CELL * 0.8 + wave, fx, fy - flagH + CELL * 0.8);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = "rgba(255,255,255,0.9)";
  ctx.font = `${CELL * 0.55}px serif`;
  ctx.fillText(FLAG_OF[player] || "\u2654", fx + CELL * 0.35, fy - flagH + CELL * 0.6 + wave * 0.6);

    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.arc(cx, cy, R + 7, 0, Math.PI * 2);
    ctx.stroke();

    ctx.lineWidth = 4;
    ctx.beginPath();

    ctx.stroke();

    ctx.save();
    ctx.shadowColor = n.ac;
    ctx.shadowBlur = 8 + Math.sin(now / 250) * 4;
    ctx.strokeStyle = n.glow + "0.85)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, R + 6, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
